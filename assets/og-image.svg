<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Truong Dinh Anh Tu Commercial FP&amp;A Decision Pack</title>
  <desc id="desc">Open graph cover for a Commercial FP&amp;A Decision Pack with forecast, EBITDA bridge, cash runway, Power BI, Python, and QA signals.</desc>
  <defs>
    <linearGradient id="left-wash" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#030912" stop-opacity="0.96"/>
      <stop offset="0.48" stop-color="#030912" stop-opacity="0.72"/>
      <stop offset="0.78" stop-color="#07111f" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#07111f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lower-wash" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#02070d" stop-opacity="0"/>
      <stop offset="1" stop-color="#02070d" stop-opacity="0.66"/>
    </linearGradient>
    <linearGradient id="accent" x1="92" x2="690" y1="414" y2="414" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5dd7c7"/>
      <stop offset="0.82" stop-color="#5dd7c7"/>
      <stop offset="1" stop-color="#f3b65f"/>
    </linearGradient>
    <filter id="panel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>

  <image href="finance-logistics-hero.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="#07111f" opacity="0.46"/>
  <rect width="1200" height="630" fill="url(#left-wash)"/>
  <rect width="1200" height="630" fill="url(#lower-wash)"/>

  <rect x="56" y="54" width="1088" height="522" rx="11" fill="none" stroke="#f8fbff" stroke-opacity="0.28"/>
  <path d="M92 86H176M92 86V126" fill="none" stroke="#f3b65f" stroke-opacity="0.82" stroke-width="2"/>
  <path d="M1060 544H1108" fill="none" stroke="#5dd7c7" stroke-opacity="0.68" stroke-width="2"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <rect x="92" y="104" width="62" height="39" rx="8" fill="#07111f" fill-opacity="0.64" stroke="#f3b65f" stroke-opacity="0.72"/>
    <text x="123" y="129" text-anchor="middle" font-size="15" font-weight="800" fill="#f3c46f">AT</text>
    <text x="174" y="140" font-size="19" font-weight="800" fill="#f8fbff">TRUONG DINH ANH TU</text>
    <text x="174" y="165" font-size="17" fill="#cbd8e6">Vietnam to regional finance roles</text>

    <text x="92" y="307" font-size="76" font-weight="800" fill="#ffffff">Commercial FP&amp;A</text>
    <text x="92" y="389" font-size="72" font-weight="800" fill="#ffffff">Decision Pack</text>
    <rect x="92" y="414" width="598" height="3" rx="1.5" fill="url(#accent)"/>
    <rect x="92" y="417" width="598" height="6" rx="3" fill="#6ab8ff" opacity="0.18"/>
    <text x="92" y="490" font-size="27" fill="#f3f8ff">Forecast calls, EBITDA bridges, cash runway,</text>
    <text x="92" y="524" font-size="25" fill="#dfeaf6">and governance-ready BI for management decisions.</text>

    <g font-size="16" font-weight="800" fill="#f8fbff">
      <circle cx="97" cy="545" r="4.5" fill="#6ab8ff"/>
      <text x="110" y="557">Driver Forecast</text>
      <circle cx="263" cy="545" r="4.5" fill="#5dd7c7"/>
      <text x="276" y="557">EBITDA Bridge</text>
      <circle cx="429" cy="545" r="4.5" fill="#f3b65f"/>
      <text x="442" y="557">Cash Runway</text>
      <circle cx="583" cy="545" r="4.5" fill="#f8fbff"/>
      <text x="596" y="557">Public-Safe QA</text>
    </g>

    <g filter="url(#panel-shadow)">
      <rect x="792" y="112" width="306" height="404" rx="12" fill="#050d18" fill-opacity="0.72" stroke="#f8fbff" stroke-opacity="0.34"/>
      <text x="824" y="167" font-size="14" font-weight="800" fill="#f3b65f">CFO PERFORMANCE PACK</text>
      <path d="M824 180H1066" stroke="#f8fbff" stroke-opacity="0.28"/>
      <text x="824" y="250" font-size="25" font-weight="800" fill="#ffffff">Performance</text>
      <text x="824" y="281" font-size="25" font-weight="800" fill="#ffffff">drivers with</text>
      <text x="824" y="312" font-size="25" font-weight="800" fill="#ffffff">next actions</text>
      <text x="824" y="333" font-size="13" fill="#c8d6e5">Public-safe finance artifacts</text>
      <text x="824" y="354" font-size="13" fill="#c8d6e5">designed for a 30-second scan.</text>
      <g font-size="14" fill="#f8fbff">
        <text x="824" y="396">Forecast scenario</text>
        <rect x="950" y="388" width="112" height="8" rx="4" fill="#f8fbff" opacity="0.18"/>
        <rect x="950" y="388" width="83" height="8" rx="4" fill="#6ab8ff"/>
        <text x="824" y="436">Variance bridge</text>
        <rect x="950" y="428" width="112" height="8" rx="4" fill="#f8fbff" opacity="0.18"/>
        <rect x="950" y="428" width="65" height="8" rx="4" fill="#5dd7c7"/>
        <text x="824" y="476">Cash runway</text>
        <rect x="950" y="468" width="112" height="8" rx="4" fill="#f8fbff" opacity="0.18"/>
        <rect x="950" y="468" width="92" height="8" rx="4" fill="#f3b65f"/>
      </g>
      <text x="824" y="507" font-size="13" font-weight="800" fill="#dbe7f4">POWER BI + PYTHON + QA</text>
    </g>
  </g>
</svg>
