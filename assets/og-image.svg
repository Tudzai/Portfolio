<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FP&amp;A that turns business questions into trusted decisions</title>
  <desc id="desc">Open graph cover for Truong Dinh Anh Tu's Commercial FP&amp;A portfolio, based on the homepage opener with a trusted decisions headline and finance decision cockpit.</desc>
  <defs>
    <linearGradient id="left-wash" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#040a14" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#040a14" stop-opacity="0.78"/>
      <stop offset="0.82" stop-color="#07111f" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#07111f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lower-wash" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#02070e" stop-opacity="0"/>
      <stop offset="1" stop-color="#02070e" stop-opacity="0.68"/>
    </linearGradient>
    <filter id="panel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <image href="finance-logistics-hero.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="#07111f" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#left-wash)"/>
  <rect width="1200" height="630" fill="url(#lower-wash)"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="92" y="99" font-size="15" font-weight="800" fill="#c89431">MODERN FP&amp;A PORTFOLIO</text>
    <text x="92" y="213" font-size="58" font-weight="800" fill="#ffffff">FP&amp;A that turns</text>
    <text x="92" y="283" font-size="58" font-weight="800" fill="#ffffff">business questions</text>
    <text x="92" y="353" font-size="58" font-weight="800" fill="#ffffff">into trusted decisions.</text>
    <text x="92" y="413" font-size="21" fill="#d7e0eb">Finance fundamentals, Power BI, SQL, Python, and AI workflows</text>
    <text x="92" y="445" font-size="21" fill="#d7e0eb">for budget, forecast, variance, and cash decisions leaders can use.</text>

    <g font-size="14" font-weight="800" fill="#f8fbff">
      <rect x="92" y="474" width="204" height="34" rx="8" fill="#172338" fill-opacity="0.86" stroke="#f8fbff" stroke-opacity="0.23"/>
      <text x="105" y="496">Trust builds the brand.</text>
      <rect x="314" y="474" width="230" height="34" rx="8" fill="#172338" fill-opacity="0.86" stroke="#f8fbff" stroke-opacity="0.23"/>
      <text x="327" y="496">Insight builds the decision.</text>
    </g>

    <g font-size="13" font-weight="800">
      <rect x="92" y="526" width="392" height="34" rx="8" fill="#07111f" fill-opacity="0.88" stroke="#f8fbff" stroke-opacity="0.18"/>
      <text x="108" y="548" fill="#f3b65f">TDAT</text>
      <text x="170" y="548" fill="#f8fbff">Total Defense</text>
      <path d="M284 543H340" stroke="#6ab8ff" stroke-width="2"/>
      <path d="M340 543H366" stroke="#f3b65f" stroke-width="2"/>
      <text x="386" y="548" fill="#f8fbff">Absolute Trust</text>
    </g>

    <g filter="url(#panel-shadow)">
      <rect x="760" y="54" width="348" height="522" rx="10" fill="#111f30" fill-opacity="0.93" stroke="#8de1d6" stroke-opacity="0.26"/>
      <path d="M761 55H1107" stroke="#f3b65f" stroke-opacity="0.62" stroke-width="2"/>
      <path d="M761 55H890" stroke="#5dd7c7" stroke-opacity="0.72" stroke-width="3"/>
      <text x="788" y="98" font-size="13" font-weight="800" fill="#f3b65f">DECISION COCKPIT</text>
      <text x="788" y="145" font-size="22" font-weight="800" fill="#f8fbff">What I help finance teams clarify</text>

      <g font-size="15" font-weight="800">
        <rect x="788" y="157" width="136" height="38" rx="7" fill="#f8fbff"/>
        <text x="856" y="181" text-anchor="middle" fill="#111b2d">Budget</text>
        <rect x="936" y="157" width="136" height="38" rx="7" fill="#2c3b4d" stroke="#f8fbff" stroke-opacity="0.22"/>
        <text x="1004" y="181" text-anchor="middle" fill="#d2dbe6">Forecast</text>
        <rect x="788" y="207" width="136" height="38" rx="7" fill="#2c3b4d" stroke="#f8fbff" stroke-opacity="0.22"/>
        <text x="856" y="231" text-anchor="middle" fill="#d2dbe6">Cash</text>
        <rect x="936" y="207" width="136" height="38" rx="7" fill="#2c3b4d" stroke="#f8fbff" stroke-opacity="0.22"/>
        <text x="1004" y="231" text-anchor="middle" fill="#d2dbe6">Automate</text>
      </g>

      <rect x="788" y="265" width="292" height="222" rx="8" fill="#08131f" fill-opacity="0.9" stroke="#f8fbff" stroke-opacity="0.22"/>
      <text x="806" y="314" font-size="13" font-weight="800" fill="#f3b65f">PLAN VS ACTUAL</text>
      <text x="806" y="361" font-size="24" font-weight="800" fill="#ffffff">Budget control</text>
      <text x="806" y="392" font-size="14" fill="#cbd8e6">Translate annual targets into branch,</text>
      <text x="806" y="415" font-size="14" fill="#cbd8e6">department, and customer guardrails.</text>
      <path d="M810 426H1058M810 450H1058M810 474H1058" stroke="#f8fbff" stroke-opacity="0.12"/>
      <g>
        <rect x="810" y="454" width="34" height="34" rx="17" fill="#6ab8ff" fill-opacity="0.7"/>
        <rect x="810" y="472" width="34" height="16" fill="#f3b65f" fill-opacity="0.45"/>
        <rect x="864" y="438" width="34" height="50" rx="17" fill="#5dd7c7" fill-opacity="0.7"/>
        <rect x="864" y="456" width="34" height="32" fill="#f3b65f" fill-opacity="0.45"/>
        <rect x="918" y="422" width="34" height="66" rx="17" fill="#8fbfff" fill-opacity="0.7"/>
        <rect x="918" y="440" width="34" height="48" fill="#f3b65f" fill-opacity="0.45"/>
        <rect x="972" y="435" width="34" height="53" rx="17" fill="#5dd7c7" fill-opacity="0.7"/>
        <rect x="972" y="453" width="34" height="35" fill="#f3b65f" fill-opacity="0.45"/>
        <rect x="1026" y="414" width="34" height="74" rx="17" fill="#8fbfff" fill-opacity="0.7"/>
        <rect x="1026" y="432" width="34" height="56" fill="#f3b65f" fill-opacity="0.45"/>
      </g>

      <g font-size="12" fill="#d0d9e5">
        <rect x="788" y="488" width="88" height="58" rx="7" fill="#323d45" stroke="#f8fbff" stroke-opacity="0.18"/>
        <text x="798" y="525" font-size="15" font-weight="800" fill="#ffffff">16-20M</text>
        <text x="798" y="545">cells processed</text>
        <rect x="889" y="488" width="88" height="58" rx="7" fill="#323d45" stroke="#f8fbff" stroke-opacity="0.18"/>
        <text x="899" y="525" font-size="15" font-weight="800" fill="#ffffff">~90%</text>
        <text x="899" y="545">prep time cut</text>
        <rect x="990" y="488" width="88" height="58" rx="7" fill="#323d45" stroke="#f8fbff" stroke-opacity="0.18"/>
        <text x="1000" y="525" font-size="15" font-weight="800" fill="#ffffff">7 entities</text>
        <text x="1000" y="545">budget scope</text>
      </g>
    </g>
  </g>
</svg>
