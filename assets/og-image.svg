<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FP&amp;A that turns business questions into trusted decisions</title>
  <desc id="desc">Open graph cover for Truong Dinh Anh Tu's Commercial FP&amp;A portfolio, with a left-aligned trusted decisions headline over a finance and logistics workspace.</desc>
  <defs>
    <linearGradient id="left-wash" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#040911" stop-opacity="0.98"/>
      <stop offset="0.52" stop-color="#040911" stop-opacity="0.94"/>
      <stop offset="0.78" stop-color="#040911" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#040911" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lower-wash" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#02070e" stop-opacity="0"/>
      <stop offset="1" stop-color="#02070e" stop-opacity="0.56"/>
    </linearGradient>
  </defs>

  <image href="finance-logistics-hero.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="#050a12" opacity="0.46"/>
  <rect width="1200" height="630" fill="url(#left-wash)"/>
  <rect width="1200" height="630" fill="url(#lower-wash)"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <rect x="56" y="54" width="1088" height="522" rx="12" fill="none" stroke="#f8fbff" stroke-opacity="0.72" stroke-width="2"/>
    <path d="M92 84H188M92 84V126" stroke="#f0b552" stroke-width="3"/>

    <text x="92" y="126" font-size="16" font-weight="800" fill="#cf972d">MODERN FP&amp;A PORTFOLIO</text>
    <text x="92" y="162" font-size="18" font-weight="800" fill="#f8fbff">TRUONG DINH ANH TU</text>
    <text x="92" y="188" font-size="18" fill="#d6e0eb">Commercial FP&amp;A - Vietnam to regional finance roles</text>

    <text x="92" y="297" font-size="58" font-weight="800" fill="#f8fbff">FP&amp;A that turns</text>
    <text x="92" y="365" font-size="58" font-weight="800" fill="#f8fbff">business questions</text>
    <text x="92" y="433" font-size="58" font-weight="800" fill="#f8fbff">into trusted decisions.</text>

    <path d="M92 451H384" stroke="#57d3c6" stroke-width="7" stroke-linecap="round"/>
    <path d="M384 451H548" stroke="#6997ff" stroke-width="7" stroke-linecap="round"/>
    <path d="M548 451H650" stroke="#f0b552" stroke-width="7" stroke-linecap="round"/>

    <text x="92" y="511" font-size="21" fill="#d6e0eb">Budget, forecast, variance, cash, Power BI, SQL, Python,</text>
    <text x="92" y="542" font-size="21" fill="#d6e0eb">and AI workflows built for decisions leaders can use.</text>
  </g>
</svg>
